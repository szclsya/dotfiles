general {
    colors = true
    interval = 5
}

order += "mpd_status"
order += "volume_status"
order += "weather_owm"
order += "backlight"
order += "diskdata"
order += "ethernet enp0s25"
#order += "wifi"
order += "wireless wlp3s0"
#order += "net_rate"
order += "online_status"
order += "battery_level"
order += "time"

mpd_status{
    state_pause = "ΎΛΝ"
    state_play = "ΎΑζ"
    state_stop = "ΎΛΟ"
    format = "{state} [[[{artist} - ]{title}]|[{file}]]"
    on_click 1 = "exec mpc toggle; exec py3-cmd refresh all"
    on_click 2 = "refresh"
    on_click 3 = "exec mpc next; exec py3-cmd refresh all"
}

volume_status {
    color = "#4169e1"
    format = "ΎΑρ {percentage}%"
    format_muted = "ΎΑο"
    on_click 1 = "exec pactl set-sink-volume 0 +5% ; exec py3-cmd refresh all"
    on_click 3 = "exec pactl set-sink-volume 0 -5% ; exec py3-cmd refresh all"
}

weather_owm {
    color = "#17C3EB"
    api_key = "32e87e3f9a88682e52ee5232271b1ce3"
    unit_temperature = "c"
    format = "{city} {temperature}[ {rain}] {description}"
}

backlight {
    color = "#ffd700"
    format = "ΎΔτ{level}"
}

diskdata {
    color = "#00FFFF"
    disk = "sdb2"
    format = "ΎΓι{used_percent}%"
}

ethernet enp0s25 {
    format_up = "ΎΔρ%speed %ip"
    format_down = "ΎΔρ"
}

wireless wlp3s0 {
    format_up = "ΎΘτ %essid ΎΑΤ %quality %ip"
    format_down = "ΎΘτ"
}

wifi {
    format = "ΎΘτ{ssid} ΎΑΤ {signal_percent} {ip}|ΎΘτ"
}

net_rate {
    format = "{interface} ΎΑδ{up} ΎΑγ{down}"
    unit = "MiB/s"
}

online_status{
    icon_off = "ΎΑΞ"
    icon_on = "ΎΑΝ"
}

battery_level {
    format = "{icon} {percent}% ΎΑΩ{time_remaining}"
    charging_character = "ΎΔπ"
    blocks = "ΎΚΕΎΚΔΎΚΓΎΚΒΎΚΑ"
}
